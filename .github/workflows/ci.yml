name: CI

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install Crystal
      uses: crystal-lang/install-crystal@v1
      with:
        crystal: latest

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y liblapack-dev libcblas-dev

    - name: Install shards
      run: shards install

    - name: Run tests
      run: crystal spec
