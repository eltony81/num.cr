name: CI

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install Crystal
      uses: crystal-lang/install-crystal@v1
      with:
        crystal: latest

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          liblapack-dev \
          libopenblas-dev \
          libclblast-dev \
          libopencl1 \
          ocl-icd-opencl-dev \
          pocl-opencl-icd \
          libarrow-dev \
          libglib2.0-dev
        
        # Brute force fix for -lcblas not being found on some Ubuntu environments
        # We link libcblas to libopenblas which provides the same symbols
        sudo ln -sf /usr/lib/x86_64-linux-gnu/libopenblas.so /usr/lib/x86_64-linux-gnu/libcblas.so
        sudo ln -sf /usr/lib/x86_64-linux-gnu/libopenblas.so /usr/lib/x86_64-linux-gnu/libblas.so

    - name: Install shards
      run: shards install --ignore-crystal-version

    - name: Run tests
      run: |
        crystal spec -v
