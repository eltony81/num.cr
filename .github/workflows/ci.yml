name: CI

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install Crystal
      uses: crystal-lang/install-crystal@v1
      with:
        crystal: latest

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          liblapack-dev \
          libopenblas-dev \
          libcblas-dev \
          libclblast-dev \
          libopencl1 \
          ocl-icd-opencl-dev \
          pocl-opencl-icd \
          libarrow-dev \
          libglib2.0-dev

    - name: Install shards
      run: shards install --ignore-crystal-version

    - name: Debug Libraries
      run: |
        ls -l /usr/lib/x86_64-linux-gnu/libopenblas* || true
        ls -l /usr/lib/x86_64-linux-gnu/libcblas* || true
        ls -l /usr/lib/x86_64-linux-gnu/libblas* || true
        pkg-config --libs openblas || echo "openblas not in pkg-config"
        pkg-config --libs cblas || echo "cblas not in pkg-config"

    - name: Run tests
      run: |
        # Try without -Dopenblas first, it should work if libcblas-dev is installed
        crystal spec -v
